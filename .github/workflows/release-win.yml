name: Release (Windows)

# 精简版 Windows 发布构建：手动触发或推送 v* tag 触发。
# 只构建 Windows x64，跳过所有代码签名（fork 无 signing secrets）。
# 通过 --config 覆盖关闭 createUpdaterArtifacts，避免 Tauri 要求 signing key。

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-win-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri App (Windows x64)
        shell: pwsh
        run: pnpm tauri build --config "{\"bundle\":{\"createUpdaterArtifacts\":false}}"

      - name: Prepare Windows Assets
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $VERSION = $env:GITHUB_REF_NAME
          if ([string]::IsNullOrEmpty($VERSION)) { $VERSION = 'dev' }
          $targetRoot = 'src-tauri/target/release'

          # MSI 安装器
          $msi = Get-ChildItem -Path (Join-Path $targetRoot 'bundle/msi') -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -ne $msi) {
            $dest = "CC-Switch-$VERSION-Windows.msi"
            Copy-Item $msi.FullName (Join-Path release-assets $dest)
            Write-Host "MSI copied: $dest"
          } else {
            Write-Warning 'No MSI installer found'
          }

          # NSIS 安装器
          $nsis = Get-ChildItem -Path (Join-Path $targetRoot 'bundle/nsis') -Recurse -Include *-setup.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -ne $nsis) {
            $dest = "CC-Switch-$VERSION-Windows-setup.exe"
            Copy-Item $nsis.FullName (Join-Path release-assets $dest)
            Write-Host "NSIS setup copied: $dest"
          } else {
            Write-Warning 'No NSIS installer found'
          }

          # 绿色版（portable）：仅可执行文件打 zip
          $exePath = 'src-tauri/target/release/cc-switch.exe'
          if (Test-Path $exePath) {
            $portableDir = 'release-assets/CC-Switch-Portable'
            New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
            Copy-Item $exePath $portableDir
            $portableIniPath = Join-Path $portableDir 'portable.ini'
            $portableContent = @('# CC Switch portable build marker', 'portable=true')
            $portableContent | Set-Content -Path $portableIniPath -Encoding UTF8
            $portableZip = "release-assets/CC-Switch-$VERSION-Windows-Portable.zip"
            Compress-Archive -Path "$portableDir/*" -DestinationPath $portableZip -Force
            Remove-Item -Recurse -Force $portableDir
            Write-Host "Portable zip created: CC-Switch-$VERSION-Windows-Portable.zip"
          } else {
            Write-Warning "Portable exe not found at $exePath"
          }

      - name: List prepared assets
        shell: pwsh
        run: Get-ChildItem -Recurse release-assets | Format-Table -AutoSize

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-windows-x86_64
          path: release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-windows-*
          path: release-assets
          merge-multiple: true

      - name: List downloaded artifacts
        shell: bash
        run: ls -la release-assets

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: CC Switch ${{ github.ref_name }}
          prerelease: true
          body: |
            ## CC Switch ${{ github.ref_name }}

            连通性检测回退版：恢复真实 LLM 流式探测（修复 #4347 — HTTP 可达性探测会把 503 等错误误判为"通"）。

            ### 下载（Windows）

            - **x86_64**: `CC-Switch-${{ github.ref_name }}-Windows-setup.exe`（NSIS 安装版）/ `.msi`（MSI 安装版）/ `-Portable.zip`（绿色版，解压即用）

            > 本版本未做代码签名，Windows SmartScreen 可能提示"未知发布者"，选择"仍要运行"即可。
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
